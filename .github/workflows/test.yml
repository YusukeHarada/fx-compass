name: FX-Compass Pro CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # カバレッジ測定用のライブラリを追加
        pip install yfinance pandas PyYAML matplotlib pytest pytest-cov
            
    - name: Run Unit Tests with Coverage
      run: |
        if [ -d "tests" ]; then
          # ターミナルにカバレッジ結果を出力
          pytest --cov=./ --cov-report=term-missing tests/
        else
          echo "No tests directory found."
          exit 1
        fi

    - name: Run System Test (Execution Check)
      env:
        # GUIなし環境(Linux Server)でMatplotlibを動作させるための設定
        MPLBACKEND: Agg
      run: |
        python main.py
