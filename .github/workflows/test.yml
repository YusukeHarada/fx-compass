name: FX-Compass Pro CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # pandas_ta を削除し、標準ライブラリのみに絞る
        pip install yfinance pandas PyYAML matplotlib pytest
            
    - name: Run Unit Tests
      run: |
        # testsディレクトリがある場合のみ実行し、なければスキップする設定
        if [ -d "tests" ]; then
          pytest tests/
        else
          echo "No tests directory found, skipping unit tests."
        fi

    - name: Run System Test (Execution Check)
      run: |
        # 実際にスクリプトを動かして、異常終了しないか確認
        # (config.yamlが存在することを前提としています)
        python main.py