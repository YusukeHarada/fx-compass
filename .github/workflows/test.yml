name: FX-Compass Pro CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 末尾に .git を追加し、認証不要であることを明示的にする形式
        pip install "pandas_ta @ git+https://github.com/twopirllc/pandas-ta.git@development"
        pip install yfinance pandas PyYAML matplotlib pytest
            
    - name: Run Unit Tests
      run: |
        # pytestを実行（テストコードがある場合）
        pytest tests/

    - name: Run System Test (Execution Check)
      run: |
        # 実際にスクリプトを動かして、異常終了しないか確認
        python main.py