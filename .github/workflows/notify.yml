name: FX Signal Scan

on:
  schedule:
    - cron: "0 * * * 1-5"  # 平日の毎時0分 UTC（日本時間 9〜翌9時）
  workflow_dispatch:
    inputs:
      test_notification:
        description: "テスト通知を送信する（動作確認用）"
        type: boolean
        default: false
      test_chart:
        description: "チャート画像添付をテストする（動作確認用）"
        type: boolean
        default: false
      min_level:
        description: "通知最低レベル（1=WATCH〜4=CONFIRMED、デフォルト2）"
        type: choice
        options: ["1", "2", "3", "4"]
        default: "2"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install .
      - name: Test chart notification
        if: inputs.test_chart == true
        run: |
          python - <<'EOF'
          import matplotlib
          matplotlib.use('Agg')
          import matplotlib.pyplot as plt
          import os, sys
          sys.path.insert(0, '.')
          from main import _notify_discord

          fig, ax = plt.subplots(figsize=(10, 5))
          ax.plot([1,2,3,4,5], [100,102,101,103,105], color='#2c3e50', linewidth=2)
          ax.set_title('FX-Compass Chart Test (Python)')
          ax.grid(alpha=0.3)
          path = '/tmp/test_chart.png'
          plt.savefig(path, dpi=120, bbox_inches='tight')
          plt.close()

          url = os.environ.get('DISCORD_WEBHOOK_URL')
          _notify_discord('**[FX-Compass]** チャート添付テスト — Python urllib', url, [path])
          print('送信完了')
          EOF
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      - name: Test notification
        if: inputs.test_notification == true
        run: |
          curl -s -o /dev/null -w "HTTP status: %{http_code}\n" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"content": "**[FX-Compass]** テスト通知 — GitHub Actions から送信"}' \
            "$DISCORD_WEBHOOK_URL"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      - run: python main.py --min-level ${{ inputs.min_level || '2' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
